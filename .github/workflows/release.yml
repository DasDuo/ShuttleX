name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Verify release metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Resources/Info.plist)
          if [ "$PLIST_VERSION" != "$VERSION" ]; then
            echo "::error::Info.plist version ($PLIST_VERSION) does not match tag ($VERSION) — bump CFBundleShortVersionString."
            exit 1
          fi
          if ! grep -qF "## [$VERSION]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for $VERSION (expected a '## [$VERSION]' section) — add it before tagging."
            exit 1
          fi
          echo "OK: version $VERSION matches Info.plist and has a CHANGELOG entry."
      - name: Build (arm64)
        run: ./build.sh
      - name: Package DMG
        run: ./make-dmg.sh
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## [$VERSION]" '
            index($0, ver) == 1 { flag = 1; next }
            /^## \[/ { if (flag) exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Release $VERSION" > RELEASE_NOTES.md
          echo "---- release notes ----"; cat RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ShuttleX-*-arm64.dmg ShuttleX-*-arm64.zip --title "ShuttleX $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
