name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Verify release metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Resources/Info.plist)
          if [ "$PLIST_VERSION" != "$VERSION" ]; then
            echo "::error::Info.plist version ($PLIST_VERSION) does not match tag ($VERSION) — bump CFBundleShortVersionString."
            exit 1
          fi
          if ! grep -qF "## [$VERSION]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for $VERSION (expected a '## [$VERSION]' section) — add it before tagging."
            exit 1
          fi
          echo "OK: version $VERSION matches Info.plist and has a CHANGELOG entry."
      - name: Build (arm64)
        run: ./build.sh
      - name: Package DMG
        run: ./make-dmg.sh
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## [$VERSION]" '
            index($0, ver) == 1 { flag = 1; next }
            /^## \[/ { if (flag) exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Release $VERSION" > RELEASE_NOTES.md
          echo "---- release notes ----"; cat RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ShuttleX-*-arm64.dmg ShuttleX-*-arm64.zip --title "ShuttleX $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
      - name: Update Homebrew cask
        continue-on-error: true   # release is already published; a cask hiccup shouldn't fail it
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask update. See RELEASING.md to enable it."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(shasum -a 256 "ShuttleX-${VERSION}-arm64.dmg" | awk '{print $1}')
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/DasDuo/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/shuttlex.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/shuttlex.rb
          git add Casks/shuttlex.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date for ${VERSION}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "shuttlex ${VERSION}"
          if git push; then
            echo "Updated homebrew-tap cask to ${VERSION} (${SHA})."
          else
            echo "::warning::Homebrew cask push failed — check HOMEBREW_TAP_TOKEN has Contents:write on homebrew-tap, then bump manually per RELEASING.md."
            exit 1
          fi
